url: https://strategicprojects.github.io/datasusr/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#0d6efd"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
  includes:
    in_header: pkgdown/extra.css

home:
  title: "datasusr - Fast Access to Brazilian Public Health Data from DATASUS"
  description: >
    A focused, dependency-light reader for DATASUS DBC files plus a catalog
    and FTP layer. For broader Brazilian public-health workflows (IBGE
    surveys, SISAB, ANS, ANVISA, variable dictionaries) consider healthbR
    first — see "Comparison with healthbR and microdatasus".

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
        - text: "Getting started"
          href: articles/getting-started.html
        - text: "Data sources"
          href: articles/data-sources.html
        - text: "Cache and downloads"
          href: articles/cache-and-downloads.html
        - text: "Performance notes"
          href: articles/performance-notes.html
        - text: -------
        - text: "Comparison with healthbR and microdatasus"
          href: articles/comparison.html

reference:
  - title: High-level workflow
    contents:
      - datasus_fetch
      - read_datasus_dbc

  - title: Catalog and discovery
    contents:
      - datasus_sources
      - datasus_modalities
      - datasus_file_types
      - datasus_ufs
      - datasus_build_path
      - datasus_ftp_ls
      - datasus_list_files
      - datasus_download

  - title: Territorial data and documentation
    contents:
      - datasus_get_territory
      - datasus_docs_url

  - title: Cache management
    contents:
      - datasus_cache_dir
      - datasus_cache_list
      - datasus_cache_info
      - datasus_cache_clear
      - datasus_cache_prune

  - title: Utilities
    contents:
      - format_bytes

articles:
  - title: Guides
    navbar: Guides
    contents:
      - getting-started
      - data-sources
      - cache-and-downloads
      - performance-notes

  - title: Choosing a package
    navbar: Comparison
    contents:
      - comparison
